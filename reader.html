<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interview Guide Reader</title>
    <style>
      :root {
        --ink: #17202a;
        --muted: #637083;
        --line: #d9e0ea;
        --paper: #f7f8fb;
        --panel: #ffffff;
        --accent: #0f766e;
        --code: #eef2f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--paper);
        color: var(--ink);
        line-height: 1.62;
      }

      .shell {
        width: min(1040px, calc(100% - 28px));
        margin: 0 auto;
        padding: 28px 0 64px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
      }

      .back {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      .doc {
        padding: clamp(22px, 5vw, 56px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      h1,
      h2,
      h3,
      h4 {
        line-height: 1.16;
        letter-spacing: 0;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2rem, 6vw, 3.75rem);
      }

      h2 {
        margin-top: 46px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
        font-size: clamp(1.6rem, 4vw, 2.45rem);
      }

      h3 {
        margin-top: 32px;
        font-size: 1.55rem;
      }

      h4 {
        margin-top: 28px;
        font-size: 1.18rem;
      }

      p,
      li {
        font-size: 1rem;
      }

      p {
        margin: 0 0 14px;
      }

      blockquote {
        margin: 18px 0;
        padding: 14px 18px;
        border-left: 4px solid var(--accent);
        background: #eef7f5;
        color: #24413e;
      }

      code {
        padding: 0.1em 0.28em;
        border-radius: 5px;
        background: var(--code);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.94em;
      }

      pre {
        overflow-x: auto;
        padding: 16px;
        border-radius: 8px;
        background: #111827;
        color: #f9fafb;
      }

      pre code {
        padding: 0;
        background: transparent;
        color: inherit;
      }

      a {
        color: var(--accent);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 18px 0;
        font-size: 0.94rem;
      }

      th,
      td {
        padding: 9px 10px;
        border: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #eef2f7;
      }

      .status {
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .doc {
          padding: 20px 16px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="topbar">
        <a class="back" href="./">Back to guide home</a>
        <span id="status" class="status">Loading...</span>
      </div>
      <article id="doc" class="doc"></article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const allowedFiles = new Set([
        "interview-guide/STUDY-GUIDE.md",
        "interview-guide/MOCK-INTERVIEWS.md",
        "interview-guide/QUESTION-BANK.md",
        "interview-guide/ANSWER-QUALITY-AUDIT.md",
        "interview-guide/FLASHCARDS.md",
        "interview-guide/references.md"
      ]);

      const params = new URLSearchParams(window.location.search);
      const file = params.get("file") || "interview-guide/STUDY-GUIDE.md";
      const doc = document.getElementById("doc");
      const status = document.getElementById("status");

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      async function load() {
        if (!allowedFiles.has(file)) {
          doc.innerHTML = "<h1>File not allowed</h1><p>Open one of the study files from the home page.</p>";
          status.textContent = "Blocked";
          return;
        }

        try {
          const response = await fetch(file);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const markdown = await response.text();
          document.title = file.split("/").pop().replace(".md", "").replaceAll("-", " ");
          if (window.marked) {
            marked.setOptions({ gfm: true, breaks: false });
            doc.innerHTML = marked.parse(markdown);
          } else {
            doc.innerHTML = `<pre>${escapeHtml(markdown)}</pre>`;
          }
          status.textContent = file;
        } catch (error) {
          doc.innerHTML = `<h1>Could not load file</h1><p>${escapeHtml(String(error))}</p>`;
          status.textContent = "Error";
        }
      }

      load();
    </script>
  </body>
</html>
